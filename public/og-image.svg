<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f34e6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>
  <!-- Logo icon -->
  <g transform="translate(540, 180)" fill="none" stroke="#7f34e6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="60,5 115,30 115,80 60,105 5,80 5,30"/>
    <line x1="60" y1="105" x2="60" y2="55"/>
    <line x1="115" y1="30" x2="60" y2="55"/>
    <line x1="5" y1="30" x2="60" y2="55"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">HV5</text>
  <text x="600" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#a1a1aa" text-anchor="middle" letter-spacing="4">ECOSYSTEM</text>
  <!-- Tagline -->
  <text x="600" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#71717a" text-anchor="middle">Ecossistema Integrado de Soluções Corporativas</text>
  <!-- Company info -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#52525b" text-anchor="middle">TI NET LTDA | CNPJ 06.374.297/0001-31 | www.hv5.com.br</text>
</svg>
